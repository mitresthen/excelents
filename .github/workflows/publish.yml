name: Publish

# Publishes @mitresthen/excelents to npm when a GitHub Release is published.
# Auth is npm Trusted Publishing (OIDC) — no NPM_TOKEN secret. Provenance and
# public access come from package.json "publishConfig".

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile

      # Fail fast if the release tag (vX.Y.Z) and package.json version disagree,
      # so we never publish a version that doesn't match what was tagged.
      - name: Verify tag matches package.json version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          TAG="${TAG_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag $TAG_NAME does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG"

      - run: pnpm test
      - run: pnpm build

      # OIDC trusted publishing needs npm >= 11.5.1; Node 24's bundled npm can lag.
      - run: npm install -g npm@latest
      - run: npm publish # OIDC auth; access/provenance from publishConfig
