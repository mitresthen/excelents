name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['24']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm test
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:browser
      - run: pnpm build
      - run: pnpm smoke
      - run: pnpm size
      # tsdown runs publint + attw in ci-only mode during build

  types-compat:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        ts: ['5.9', '6.0']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check shipped .d.ts resolves on TypeScript ${{ matrix.ts }}
        run: |
          pnpm pack
          TARBALL=$(ls mitresthen-excelents-*.tgz | head -1)
          CONSUMER=$(mktemp -d)
          cd "$CONSUMER"
          npm init -y
          npm install "$OLDPWD/$TARBALL" typescript@${{ matrix.ts }}
          printf 'import { version } from "@mitresthen/excelents"\nconst v: string = version\n' > consumer.ts
          npx tsc --noEmit --moduleResolution bundler --module esnext consumer.ts
          cd "$OLDPWD"
          rm -rf "$CONSUMER" "$TARBALL"
