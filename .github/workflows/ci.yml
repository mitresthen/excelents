name: CI
on:
  push:
    branches: [excelents-rewrite, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm test
      - run: pnpm build
      - run: pnpm size
      # tsdown runs publint + attw in ci-only mode during build

  types-compat:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        ts: ['5.9', '6.0']
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Check shipped .d.ts resolves on TypeScript ${{ matrix.ts }}
        run: |
          pnpm pack
          TARBALL=$(ls excelents-*.tgz)
          CONSUMER=$(mktemp -d)
          cd "$CONSUMER"
          npm init -y
          npm install "$OLDPWD/$TARBALL" typescript@${{ matrix.ts }}
          printf 'import { version } from "excelents"\nconst v: string = version\n' > consumer.ts
          npx tsc --noEmit --moduleResolution bundler --module esnext consumer.ts
          cd "$OLDPWD"
          rm -rf "$CONSUMER" "$TARBALL"
